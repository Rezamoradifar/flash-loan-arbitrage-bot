# Reverse proxy for the frontend (Next.js) and the keeper's read-only API.
# Self-contained nginx.conf (mount at /etc/nginx/nginx.conf) - terminates
# plain HTTP; put a TLS-terminating load balancer or certbot-managed
# certificate in front of this for direct internet exposure.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    limit_req_zone $binary_remote_addr zone=keeper_api:10m rate=5r/s;

    server {
        listen 80;
        server_name _;

        # Keeper read-only API (status/opportunities/metrics) - GET-only, no
        # secrets ever transit this path. Rate-limited to blunt casual scraping.
        # /keeper-api/api/status -> keeper:4001/api/status (the frontend's
        # NEXT_PUBLIC_KEEPER_API_URL=/keeper-api already includes the /api
        # segment via its own fetch calls, e.g. `${KEEPER_API_URL}/api/status`).
        location /keeper-api/ {
            limit_req zone=keeper_api burst=20 nodelay;
            proxy_pass http://keeper:4001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
