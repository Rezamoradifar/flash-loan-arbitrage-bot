[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# Only used in network-restricted sandboxes that can't reach the normal solc
# release servers. On a normal machine, delete these two lines and forge
# will auto-download solc 0.8.24 natively - no need for bin/solc at all.
# solc = "bin/solc"
# offline = true
